<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Globelink商行 - 全球网络加速</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#00e5ff;--primary-dark:#0091ea;--accent:#ff4081;--bg:#0a0e27;--bg-card:#111638;--text:#e0e0e0;--text-muted:#8892b0;--border:rgba(0,229,255,.15);--success:#00e676;--warning:#ffea00;--danger:#ff1744}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--primary);text-decoration:none}
.navbar{background:rgba(10,14,39,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-container{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:20px;font-weight:700;color:var(--primary);text-shadow:0 0 10px rgba(0,229,255,.4)}
.nav-links{display:flex;gap:24px}
.nav-links a{color:var(--text-muted);font-size:14px;transition:color .2s}
.nav-links a:hover{color:var(--primary)}
.hero{text-align:center;padding:80px 24px 60px;background:linear-gradient(180deg,rgba(0,229,255,.05) 0%,transparent 100%)}
.hero h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--primary),#a78bfa,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
.hero p{font-size:16px;color:var(--text-muted);margin-bottom:24px}
.hero-tags{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.tag{background:rgba(0,229,255,.1);border:1px solid var(--border);padding:6px 16px;border-radius:20px;font-size:13px;color:var(--primary)}
.filter-bar{display:flex;gap:10px;justify-content:center;padding:20px 24px;flex-wrap:wrap}
.filter-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(0,229,255,.15);color:var(--primary);border-color:var(--primary)}
.products-section{max-width:1200px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;transition:all .3s;position:relative;overflow:hidden}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:opacity .3s}
.product-card:hover{transform:translateY(-4px);border-color:rgba(0,229,255,.3);box-shadow:0 8px 32px rgba(0,229,255,.1)}
.product-card:hover::before{opacity:1}
.product-cat{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px}
.product-name{font-size:18px;font-weight:700;margin-bottom:8px;color:#fff}
.product-spec{font-size:13px;color:var(--text-muted);margin-bottom:12px}
.product-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.product-tag{background:rgba(0,229,255,.08);color:var(--primary);font-size:11px;padding:2px 8px;border-radius:4px}
.product-price{font-size:28px;font-weight:800;color:var(--primary);text-shadow:0 0 10px rgba(0,229,255,.3);margin-bottom:16px}
.product-price span{font-size:14px;font-weight:400;color:var(--text-muted)}
.product-desc{font-size:13px;color:var(--text-muted);margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.btn-order{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-order:hover{box-shadow:0 4px 20px rgba(0,229,255,.4);transform:translateY(-1px)}
.footer{background:rgba(0,0,0,.3);border-top:1px solid var(--border);padding:40px 24px 20px}
.footer-content{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px}
.footer-col h3{font-size:14px;color:var(--primary);margin-bottom:10px}
.footer-col p{font-size:13px;color:var(--text-muted);margin-bottom:4px}
.footer-bottom{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,.05);font-size:12px;color:var(--text-muted)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px;color:var(--primary)}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.order-product-info{background:rgba(0,229,255,.05);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px}
.order-product-info h3{font-size:16px;color:#fff;margin-bottom:4px}
.order-product-info p{font-size:13px;color:var(--text-muted)}
.order-product-info .price{font-size:22px;font-weight:800;color:var(--primary);margin-top:8px}
@media(max-width:768px){.nav-links{display:none}.hero h1{font-size:24px}.hero{padding:40px 16px 30px}.products-section{grid-template-columns:1fr;padding:0 16px 40px}}
</style>
</head>
<body>
<nav class="navbar">
<div class="nav-container">
<a href="#" class="logo">🌐 Globelink商行</a>
<div class="nav-links">

<a href="#apple">美区ID</a>
<a href="#charge">代充服务</a>

</div>
</div>
</nav>
<section class="hero">
<div class="hero-content">
<h1>全球网络加速 · 一站式数字服务</h1>
<p>VPN加速 | 美区Apple ID | 国外软件代充 | 远程配置指导</p>
<div class="hero-tags">
<span class="tag">📖 均附教程</span>
<span class="tag">🛠 远程协助 ¥8/次</span>
<span class="tag">💳 微信/支付宝/USDT</span>
</div>
</div>
</section>
<div class="filter-bar">
<button class="filter-btn active" data-cat="all">全部商品</button>
<button class="filter-btn" data-cat="vpn">VPN加速</button>
<button class="filter-btn" data-cat="apple">美区ID</button>
<button class="filter-btn" data-cat="charge">代充服务</button>
<button class="filter-btn" data-cat="extra">增值服务</button>
</div>
<section class="products-section" id="products-grid"></section>
<footer class="footer">
<div class="footer-content">
<div class="footer-col"><h3>🌐 Globelink商行</h3><p>全球网络加速 · 一站式数字服务</p></div>
<div class="footer-col"><h3>支付方式</h3><p>微信支付 · 支付宝 · USDT</p></div>
<div class="footer-col"><h3>客服联系</h3><p>微信: globelink_support</p><p>QQ: 123456789</p></div>
</div>
<div class="footer-bottom"><p>© 2026 Globelink商行 All Rights Reserved.</p></div>
</footer>
<div class="modal-overlay" id="order-modal">
<div class="modal">
<div class="modal-header"><h2>📦 提交订单</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
<div class="modal-body">
<div class="order-product-info" id="order-product-info"></div>
<form id="order-form">
<div class="form-group"><label>姓名 / 昵称 *</label><input type="text" id="order-name" required placeholder="您的称呼"></div>
<div class="form-group"><label>联系方式（微信/QQ） *</label><input type="text" id="order-contact" required placeholder="用于交付商品"></div>
<div class="form-group"><label>支付方式 *</label><select id="order-payment" required><option value="">请选择</option><option value="wechat">微信支付</option><option value="alipay">支付宝</option><option value="usdt">USDT</option></select></div>
<div class="form-group"><label>备注</label><textarea id="order-note" rows="3" placeholder="特殊要求或问题"></textarea></div>
<button type="submit" class="btn-submit">确认提交订单</button>
</form>

</div>
</div>
<script>
(function(){
var cn={vpn:'VPN加速',apple:'美区ID',charge:'代充服务',extra:'增值服务'};
var ci={vpn:'🌐',apple:'🍎',charge:'⚡',extra:'🛠'};
function lp(){var d=localStorage.getItem('gl_products');if(!d){var defaults=[{id:1,name:'手机加速器',category:'vpn',price:15,spec:'月付 15元/月',tags:['教程','手机'],description:'手机端全球网络加速，稳定高速，附详细使用教程。',status:'active'},{id:2,name:'电脑不限速',category:'vpn',price:88,spec:'月付 88元/1000G',tags:['教程','电脑','不限速'],description:'电脑端不限时高速加速，月流量1000G，适合重度用户。',status:'active'},{id:3,name:'季度VIP套餐',category:'vpn',price:198,spec:'手机+电脑 季度',tags:['教程','套餐','优惠'],description:'手机+电脑双端加速，季度套餐更划算。',status:'active'},{id:4,name:'年度VIP',category:'vpn',price:698,spec:'全端不限速 年度',tags:['教程','年度','超值'],description:'全年全端不限速，平均每月不到60元。',status:'active'},{id:5,name:'美区Apple ID（临时）',category:'apple',price:5,spec:'单次使用',tags:['教程','临时'],description:'临时体验号，适合偶尔下载APP的用户。',status:'active'},{id:6,name:'美区Apple ID（永久）',category:'apple',price:58,spec:'独享绑定',tags:['教程','永久','独享'],description:'永久独享账号，支持绑定个人信息，安全可靠。',status:'active'},{id:7,name:'Apple家庭组',category:'apple',price:268,spec:'6人团 年度',tags:['教程','家庭组'],description:'加入我们的Apple家庭组，共享付费应用和资源。',status:'active'},{id:8,name:'GPT Plus 会员',category:'charge',price:35,spec:'月付',tags:['代充','秒到'],description:'ChatGPT Plus月卡代充，官方账号，安全可靠。',status:'active'},{id:9,name:'Claude Pro',category:'charge',price:40,spec:'月付',tags:['代充','秒到'],description:'Anthropic Claude Pro月度会员代充。',status:'active'},{id:10,name:'Midjourney',category:'charge',price:30,spec:'月付',tags:['代充','AI绘画'],description:'MJ月度会员代充，支持各种AI绘画需求。',status:'active'},{id:11,name:'远程配置服务',category:'extra',price:8,spec:'一对一指导',tags:['远程','教程'],description:'一对一远程协助，帮您配置各种软件和服务。',status:'active'},{id:12,name:'其他国外软件代充',category:'charge',price:20,spec:'按需报价',tags:['代充','咨询'],description:'除以上列出的软件外，其他国外软件也可代充，请联系客服询价。',status:'active'}];localStorage.setItem('gl_products',JSON.stringify(defaults));return defaults}return JSON.parse(d)}
function gs(){var d=localStorage.getItem('gl_settings');return d?JSON.parse(d):{wechat:'globelink_support',qq:'123456789',usdt:'',banner_title:'全球网络加速 · 一站式数字服务',banner_sub:'VPN加速 | 美区Apple ID | 国外软件代充 | 远程配置指导'}}
function eh(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ea(s){return String(s).replace(/'/g,"\\'").replace(/\\/g,'\\\\')}
function rp(fc){var ps=lp().filter(function(p){return p.status==='active'});var f=fc==='all'?ps:ps.filter(function(p){return p.category===fc});var c=document.getElementById('products-grid');if(!c)return;if(f.length===0){c.innerHTML='<p style="text-align:center;color:#8892b0;grid-column:1/-1;padding:60px 0;">暂无商品</p>';return}
c.innerHTML=f.map(function(p){var tags=p.tags||[];var th=tags.map(function(t){return'<span class="product-tag">'+eh(t)+'</span>'}).join('');return'<div class="product-card"><div class="product-cat">'+(ci[p.category]||'')+' '+cn[p.category]+'</div><div class="product-name">'+eh(p.name)+'</div><div class="product-spec">'+eh(p.spec)+'</div><div class="product-tags">'+th+'</div><div class="product-price">¥'+p.price+'</div>'+(p.description?'<div class="product-desc">'+eh(p.description)+'</div>':'')+'<button class="btn-order" onclick="window.openOrder('+p.id+',\\"'+ea(p.name)+'\\","+p.price+')">立即下单</button></div>'}).join('')}
window.openOrder=function(pid,pn,pr){var s=gs();document.getElementById('order-product-info').innerHTML='<h3>'+eh(pn)+'</h3><div class="price">¥'+pr+'</div>';document.getElementById('order-modal').classList.add('show');document.getElementById('order-form').onsubmit=function(e){e.preventDefault();var nm=document.getElementById('order-name').value,ct=document.getElementById('order-contact').value,pm=document.getElementById('order-payment').value,nt=document.getElementById('order-note').value;var orders=JSON.parse(localStorage.getItem('gl_orders')||'[]');var oid='GL'+Date.now();orders.unshift({id:oid,product_id:pid,product_name:pn,price:pr,customer_name:nm,contact:ct,payment:pm,note:nt,status:'pending',created_at:new Date().toLocaleString('zh-CN')});localStorage.setItem('gl_orders',JSON.stringify(orders));var msg='✅ 订单已提交！订单号：'+oid+'\n\n请按以下方式联系客服完成支付：\n💬 微信: '+s.wechat+'\n💬 QQ: '+s.qq;if(s.usdt)msg+='\n💰 USDT: '+s.usdt;msg+='\n\n付款后发送订单号给客服即可！';alert(msg);closeModal();document.getElementById('order-form').reset()}}
window.closeModal=function(){document.getElementById('order-modal').classList.remove('show')}
document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');rp(btn.dataset.cat)})});rp('all')})();
</script>
